<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2D1F00"/>
      <stop offset="100%" stop-color="#0F0E17"/>
    </radialGradient>
    <radialGradient id="coin" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="60%" stop-color="#F5C842"/>
      <stop offset="100%" stop-color="#FF9500"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Glow -->
  <circle cx="256" cy="256" r="170" fill="#F5C842" opacity="0.12" filter="url(#glow)"/>
  <!-- Coin body -->
  <circle cx="256" cy="256" r="165" fill="url(#coin)"/>
  <!-- Coin inner ring -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="#FFE066" stroke-width="6" opacity="0.6"/>
  <!-- Letter М -->
  <text x="256" y="300" font-family="Arial Black, sans-serif" font-size="160" font-weight="900"
        text-anchor="middle" fill="#1A1000" opacity="0.85">М</text>
  <!-- Shine -->
  <ellipse cx="210" cy="195" rx="45" ry="25" fill="white" opacity="0.25" transform="rotate(-35 210 195)"/>
</svg>
