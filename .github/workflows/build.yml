name: Build & Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Copy web assets into Android
        run: |
          mkdir -p android/app/src/main/assets
          cp -r web android/app/src/main/assets/web

      - name: Create google-services.json stub
        run: |
          echo '{"project_info":{"project_number":"000000000000","project_id":"mamacoin-stub","storage_bucket":"mamacoin-stub.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:000000000000:android:0000000000000000000000","android_client_info":{"package_name":"com.mamacoin"}},"oauth_client":[],"api_key":[{"current_key":"stub"}],"services":{"appinvite_service":{"other_platform_oauth_client":[]}}}],"configuration_version":"1"}' > android/app/google-services.json

      - name: Build Debug APK
        run: gradle assembleDebug
        working-directory: android

      - name: Rename APK
        run: |
          mkdir -p release-artifacts
          cp android/app/build/outputs/apk/debug/app-debug.apk release-artifacts/mamacoin-v${{ github.run_number }}.apk

      - name: Delete existing latest release
        if: github.ref == 'refs/heads/main'
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "МамаКоин — сборка #${{ github.run_number }}"
          body: "🪙 Сборка #${{ github.run_number }} | 🌐 https://mama-coin.ct.ws"
          files: release-artifacts/mamacoin-v${{ github.run_number }}.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate backend config.php
        if: github.ref == 'refs/heads/main'
        env:
          MC_DB_PASS: ${{ secrets.DB_PASS }}
          MC_JWT_SECRET: ${{ secrets.JWT_SECRET }}
          MC_FCM_KEY: ${{ secrets.FCM_SERVER_KEY }}
        run: python3 scripts/gen_config.py

      - name: Prepare deploy folder
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p deploy
          cp -r web       deploy/web
          cp -r backend/. deploy/backend
          cp .htaccess    deploy/.htaccess
          echo "Deploy size: $(du -sh deploy/ | cut -f1)"
          find deploy -maxdepth 3 -type f | sort

      - name: Install lftp
        if: github.ref == 'refs/heads/main'
        run: sudo apt-get install -y lftp

      - name: Deploy via FTP
        if: github.ref == 'refs/heads/main'
        env:
          FTP_USER: if0_41745763
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_HOST: ftpupload.net
        run: |
          lftp -c "
            set ftp:ssl-allow true;
            set ftp:ssl-force false;
            set ftp:passive-mode true;
            set net:timeout 60;
            set net:max-retries 3;
            set net:reconnect-interval-base 5;
            set ssl:verify-certificate false;
            set mirror:parallel-transfer-count 5;
            open -u '$FTP_USER','$FTP_PASS' ftp://$FTP_HOST;
            mirror --reverse --verbose --no-perms --no-symlinks --transfer-all deploy/ /htdocs/;
            bye;
          "
