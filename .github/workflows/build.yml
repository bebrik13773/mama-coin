name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Copy web assets into Android
        run: |
          mkdir -p android/app/src/main/assets
          cp -r web android/app/src/main/assets/web

      - name: Create google-services.json stub
        run: |
          cat > android/app/google-services.json << 'JSON'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "mamacoin-stub",
              "storage_bucket": "mamacoin-stub.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000000000",
                  "android_client_info": {
                    "package_name": "com.mamacoin"
                  }
                },
                "oauth_client": [],
                "api_key": [{ "current_key": "stub" }],
                "services": {
                  "appinvite_service": { "other_platform_oauth_client": [] }
                }
              }
            ],
            "configuration_version": "1"
          }
          JSON

      - name: Build Debug APK
        run: gradle assembleDebug
        working-directory: android

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mamacoin-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
