name: Build & Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # нужно для создания релизов

    steps:
      - uses: actions/checkout@v4

      # ── Java & Gradle ────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      # ── Подготовка Android ───────────────────────────────
      - name: Copy web assets into Android
        run: |
          mkdir -p android/app/src/main/assets
          cp -r web android/app/src/main/assets/web

      - name: Create google-services.json stub
        run: |
          cat > android/app/google-services.json << 'JSON'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "mamacoin-stub",
              "storage_bucket": "mamacoin-stub.appspot.com"
            },
            "client": [{
              "client_info": {
                "mobilesdk_app_id": "1:000000000000:android:0000000000000000000000",
                "android_client_info": { "package_name": "com.mamacoin" }
              },
              "oauth_client": [],
              "api_key": [{ "current_key": "stub" }],
              "services": { "appinvite_service": { "other_platform_oauth_client": [] } }
            }],
            "configuration_version": "1"
          }
          JSON

      # ── Сборка APK ───────────────────────────────────────
      - name: Build Debug APK
        run: gradle assembleDebug
        working-directory: android

      - name: Rename APK
        run: |
          mkdir -p release-artifacts
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             release-artifacts/mamacoin-v${{ github.run_number }}.apk

      # ── Создание GitHub Release с тегом latest ───────────
      - name: Delete existing 'latest' tag and release
        if: github.ref == 'refs/heads/main'
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release (latest)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "МамаКоин — последняя сборка #${{ github.run_number }}"
          body: |
            🪙 **МамаКоин** — автоматическая сборка

            **Сборка:** #${{ github.run_number }}
            **Коммит:** ${{ github.sha }}
            **Ветка:** ${{ github.ref_name }}

            📱 Скачай APK ниже и установи на Android (нужно разрешить установку из неизвестных источников)
            🌐 Веб-версия: https://mama-coin.ct.ws
          files: release-artifacts/mamacoin-v${{ github.run_number }}.apk
          make_latest: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── FTP деплой backend + web на InfinityFree ─────────
      - name: Generate backend config.php from secrets
        if: github.ref == 'refs/heads/main'
        run: |
          cat > backend/config/config.php << PHP
          <?php
          define('DB_HOST',    'sql203.infinityfree.com');
          define('DB_NAME',    'if0_41745763_app');
          define('DB_USER',    'if0_41745763');
          define('DB_PASS',    '${{ secrets.DB_PASS }}');
          define('DB_CHARSET', 'utf8mb4');
          define('JWT_SECRET',       '${{ secrets.JWT_SECRET }}');
          define('JWT_EXPIRE_HOURS',  720);
          define('FCM_SERVER_KEY',   '${{ secrets.FCM_SERVER_KEY }}');
          define('APP_URL',    'https://mama-coin.ct.ws');
          define('DEBUG_MODE', false);
          PHP

      - name: Deploy to InfinityFree via FTP
        if: github.ref == 'refs/heads/main'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftpupload.net
          username: if0_41745763
          password: ${{ secrets.FTP_PASS }}
          port: 21
          local-dir: ./
          server-dir: /htdocs/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            android/**
            release-artifacts/**
            agent-plan.md
            AGENTS.md
