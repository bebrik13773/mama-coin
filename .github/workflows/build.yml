name: Build & Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Copy web assets into Android
        run: |
          mkdir -p android/app/src/main/assets
          cp -r web android/app/src/main/assets/web

      - name: Create google-services.json stub
        run: |
          cat > android/app/google-services.json << 'JSON'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "mamacoin-stub",
              "storage_bucket": "mamacoin-stub.appspot.com"
            },
            "client": [{
              "client_info": {
                "mobilesdk_app_id": "1:000000000000:android:0000000000000000000000",
                "android_client_info": { "package_name": "com.mamacoin" }
              },
              "oauth_client": [],
              "api_key": [{ "current_key": "stub" }],
              "services": { "appinvite_service": { "other_platform_oauth_client": [] } }
            }],
            "configuration_version": "1"
          }
          JSON

      - name: Build Debug APK
        run: gradle assembleDebug
        working-directory: android

      - name: Rename APK
        run: |
          mkdir -p release-artifacts
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             release-artifacts/mamacoin-v${{ github.run_number }}.apk

      # ── GitHub Release ────────────────────────────────────
      - name: Delete existing 'latest' release and tag
        if: github.ref == 'refs/heads/main'
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release (latest)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "МамаКоин — сборка #${{ github.run_number }}"
          body: |
            🪙 **МамаКоин** — автоматическая сборка #${{ github.run_number }}
            📱 Скачай APK ниже, установи на Android
            🌐 Веб-версия: https://mama-coin.ct.ws
          files: release-artifacts/mamacoin-v${{ github.run_number }}.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Собираем ТОЛЬКО нужные файлы для деплоя ──────────
      - name: Generate backend config.php
        if: github.ref == 'refs/heads/main'
        run: |
          cat > backend/config/config.php << PHP
          <?php
          define('DB_HOST',    'sql203.infinityfree.com');
          define('DB_NAME',    'if0_41745763_app');
          define('DB_USER',    'if0_41745763');
          define('DB_PASS',    '${{ secrets.DB_PASS }}');
          define('DB_CHARSET', 'utf8mb4');
          define('JWT_SECRET',       '${{ secrets.JWT_SECRET }}');
          define('JWT_EXPIRE_HOURS',  720);
          define('FCM_SERVER_KEY',   '${{ secrets.FCM_SERVER_KEY }}');
          define('APP_URL',    'https://mama-coin.ct.ws');
          define('DEBUG_MODE', false);
          PHP

      - name: Prepare deploy folder
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p deploy
          # cp -r web deploy/web     → deploy/web/  ✓
          # cp -r backend/. deploy/backend/ → deploy/backend/ ✓
          cp -r web           deploy/web
          cp -r backend/.     deploy/backend
          cp    .htaccess     deploy/.htaccess
          echo "Deploy folder size:"
          du -sh deploy/
          echo "Structure:"
          find deploy -maxdepth 3 -type f | head -20

      - name: Install lftp
        if: github.ref == 'refs/heads/main'
        run: sudo apt-get install -y lftp

      - name: Deploy via lftp
        if: github.ref == 'refs/heads/main'
        env:
          FTP_USER: if0_41745763
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_HOST: ftpupload.net
        run: |
          lftp -c "
            set ftp:ssl-allow true;
            set ftp:ssl-force false;
            set ftp:passive-mode true;
            set net:timeout 60;
            set net:max-retries 3;
            set net:reconnect-interval-base 5;
            set ssl:verify-certificate false;
            open -u '$FTP_USER','$FTP_PASS' ftp://$FTP_HOST;
            mirror --reverse --delete --verbose --no-perms \
              deploy/ /htdocs/;
            bye;
          "
